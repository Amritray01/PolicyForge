events {}

http {

  upstream frontend_v1 {
    server frontend_v1:80;
  }

  upstream frontend_v2 {
    server frontend_v2:80;
  }

  split_clients "${remote_addr}" $variant {
    90% "v1";
    10% "v2";
  }

  server {
    listen 80;

    location / {
      if ($variant = "v2") {
        proxy_pass http://frontend_v2;
      }
      proxy_pass http://frontend_v1;
    }

    location /api/ {
      proxy_pass http://backend_v1:3000/;
    }
  }
}